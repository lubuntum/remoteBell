<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/index.css"  />
    <link rel="stylesheet" href="static/modal/modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>RemoteBell</title>
</head>
<body>
    <header class="container">
        <h3>RemoteBell</h3>
    </header>
    <main class="container">
        <div class="flex-row flex-nowrap justify-center">
            <button class="alarm" onclick="alarmTrigger(this)" data-filename="bomb.mp3">В здании бомба</button>
            <button class="alarm" onclick="alarmTrigger(this)" data-filename="shooter.mp3">Стрелок в здании</button>
        </div>
        <div class="flex-row">
            <div class="days-list" id="days-list">
                <p>Загрузка расписания...</p>
            </div>
        </div>
        
    </main>
    <script type="module" src="static/index.js"></script>
    <script type="module" src="static/schedules.js"></script>
</body>
</html>
